name: Update Prices

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch prices
        env:
          BRSAPI_KEY: ${{ secrets.BRSAPI_KEY }}
        run: python scripts/fetch_prices.py

      - name: Commit updated prices
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "به‌روزرسانی خودکار قیمت‌ها"
          git push
